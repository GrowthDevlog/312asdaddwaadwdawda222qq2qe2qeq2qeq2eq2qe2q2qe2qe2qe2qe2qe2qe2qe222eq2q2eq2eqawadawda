<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deck'n'Bag — Kampfsystem Todo</title>
<style>
  :root {
    --bg: #0f0f12;
    --bg2: #16161c;
    --bg3: #1e1e27;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8e6f0;
    --muted: #7a7890;
    --subtle: #3a3850;
    --accent: #7c6af7;
    --accent2: #5a4fd4;
    --green: #4ade80;
    --green-bg: rgba(74,222,128,0.1);
    --red: #f87171;
    --amber: #fbbf24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }

  /* HEADER */
  .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .subtitle { font-size: 12px; color: var(--muted); }
  .sync-indicator { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
  .sync-dot.synced { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .sync-dot.syncing { background: var(--amber); animation: pulse 0.8s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* PROGRESS BAR */
  .progress-wrap { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
  .progress-track { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); border-radius: 3px; transition: width 0.4s ease; }
  .progress-stats { display: flex; gap: 20px; }
  .pstat { text-align: center; }
  .pstat-val { font-size: 18px; font-weight: 700; color: var(--text); }
  .pstat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

  /* LAYOUT */
  .container { max-width: 860px; margin: 0 auto; padding: 24px 20px; }

  /* PHASE */
  .phase { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
  .phase-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; user-select: none; transition: background 0.15s; }
  .phase-header:hover { background: var(--bg3); }
  .phase-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .phase-title { font-size: 14px; font-weight: 600; flex: 1; }
  .phase-badge { font-size: 11px; padding: 2px 9px; border-radius: 20px; font-weight: 500; }
  .phase-pct { font-size: 11px; color: var(--muted); min-width: 32px; text-align: right; }
  .phase-chevron { color: var(--muted); font-size: 10px; transition: transform 0.2s; }
  .phase-chevron.open { transform: rotate(90deg); }
  .phase-bar { height: 2px; }
  .phase-bar-fill { height: 100%; transition: width 0.4s; }
  .items { display: none; }
  .items.open { display: block; }

  /* ITEM */
  .item { display: flex; align-items: flex-start; gap: 12px; padding: 11px 16px; border-top: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
  .item:hover { background: rgba(124,106,247,0.05); }
  .item.done .item-text { text-decoration: line-through; color: var(--muted); }
  .item.done .item-sub { color: var(--subtle); }
  .checkbox { width: 18px; height: 18px; min-width: 18px; border-radius: 5px; border: 1.5px solid var(--subtle); display: flex; align-items: center; justify-content: center; margin-top: 1px; transition: all 0.15s; }
  .checkbox.checked { background: var(--accent); border-color: var(--accent); }
  .checkbox.checked::after { content: ''; display: block; width: 9px; height: 6px; border-left: 2px solid #fff; border-bottom: 2px solid #fff; transform: rotate(-45deg) translate(0, -1px); }
  .item-text { font-size: 13px; line-height: 1.5; color: var(--text); }
  .item-sub { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.4; }

  /* WHO DONE IT */
  .item-meta { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 3px; min-width: 80px; }
  .item-who { font-size: 10px; color: var(--muted); white-space: nowrap; }
  .item-when { font-size: 10px; color: var(--subtle); }

  /* USER SELECT */
  .user-bar { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .user-bar label { font-size: 12px; color: var(--muted); }
  .user-input { background: var(--bg3); border: 1px solid var(--border2); border-radius: 6px; color: var(--text); font-size: 13px; padding: 5px 10px; outline: none; width: 160px; }
  .user-input:focus { border-color: var(--accent); }
  .user-btn { background: var(--accent2); border: none; color: #fff; font-size: 12px; font-weight: 600; padding: 5px 14px; border-radius: 6px; cursor: pointer; transition: background 0.15s; }
  .user-btn:hover { background: var(--accent); }
  .current-user { font-size: 12px; color: var(--accent); font-weight: 500; }

  /* REFRESH */
  .refresh-btn { background: transparent; border: 1px solid var(--border2); color: var(--muted); font-size: 11px; padding: 4px 10px; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* LOADING */
  .loading { text-align: center; padding: 48px; color: var(--muted); font-size: 14px; }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); font-size: 13px; padding: 10px 16px; border-radius: 8px; z-index: 999; opacity: 0; transform: translateY(8px); transition: all 0.25s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateY(0); }

  @media (max-width: 600px) {
    .header { padding: 12px 16px; }
    .progress-wrap { padding: 10px 16px; flex-wrap: wrap; gap: 10px; }
    .container { padding: 16px 12px; }
    .progress-stats { gap: 12px; }
    .item-meta { display: none; }
  }

  /* PASSWORD SCREEN */
  #pw-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
  #pw-screen.hidden { display: none; }
  .pw-box { background: var(--bg2); border: 1px solid var(--border2); border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 360px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
  .pw-logo { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .pw-logo span { color: var(--accent); }
  .pw-subtitle { font-size: 13px; color: var(--muted); margin-top: -12px; }
  .pw-input { width: 100%; background: var(--bg3); border: 1.5px solid var(--border2); border-radius: 8px; color: var(--text); font-size: 15px; padding: 10px 14px; outline: none; text-align: center; letter-spacing: 2px; transition: border-color 0.2s; }
  .pw-input:focus { border-color: var(--accent); }
  .pw-input.error { border-color: var(--red); animation: shake 0.3s ease; }
  .pw-btn { width: 100%; background: var(--accent2); border: none; color: #fff; font-size: 14px; font-weight: 600; padding: 10px; border-radius: 8px; cursor: pointer; transition: background 0.15s; }
  .pw-btn:hover { background: var(--accent); }
  .pw-error { font-size: 12px; color: var(--red); height: 16px; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
</style>
</head>

<script>
// ─── PASSWORD ─────────────────────────────────────────────────────────────────
const PW_HASH = '69ff92f766eee151c740a83a1612d06c5f19efe886e0429b0f5f4f377f0804fb'; // sha256 of "decknbag"

async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function checkPw() {
  const val = document.getElementById('pw-input').value;
  const hash = await sha256(val);
  if (hash === PW_HASH) {
    sessionStorage.setItem('dnb_auth', '1');
    document.getElementById('pw-screen').classList.add('hidden');
    document.getElementById('app').style.display = 'block';
    initUser();
    loadData();
  } else {
    const inp = document.getElementById('pw-input');
    const err = document.getElementById('pw-error');
    inp.classList.add('error');
    err.textContent = 'Falsches Passwort';
    inp.value = '';
    setTimeout(() => { inp.classList.remove('error'); err.textContent = ''; }, 1500);
  }
}

// Auto-unlock if already authenticated this session
if (sessionStorage.getItem('dnb_auth') === '1') {
  document.getElementById('pw-screen').classList.add('hidden');
  document.getElementById('app').style.display = 'block';
}

// Focus input on load
document.getElementById('pw-input').focus();
</script>

// ─── STATE ────────────────────────────────────────────────────────────────────
let todoState = {};   // { itemId: { done: bool, user: string, time: string } }
let openPhases = {};
let currentUser = localStorage.getItem(USER_KEY) || '';
let syncing = false;

// ─── GITHUB API ───────────────────────────────────────────────────────────────
async function loadData() {
  if (!getToken()) { setSyncState('error'); showToast('Kein Token — URL mit ?t=TOKEN aufrufen'); return; }
  setSyncState('syncing');
  try {
    const res = await fetch(GH_API, {
      headers: { 'Authorization': `token ${getToken()}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (res.status === 404) {
      todoState = {};
      fileSha = null;
      setSyncState('synced');
      render();
      return;
    }
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    fileSha = json.sha;
    todoState = JSON.parse(atob(json.content.replace(/\n/g, '')));
    setSyncState('synced');
    render();
  } catch(e) {
    setSyncState('error');
    showToast('Laden fehlgeschlagen: ' + e.message);
  }
}

async function saveData() {
  setSyncState('syncing');
  try {
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(todoState, null, 2))));
    const body = { message: 'update todo state', content };
    if (fileSha) body.sha = fileSha;
    const res = await fetch(GH_API, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${getToken()}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message || 'HTTP ' + res.status);
    }
    const json = await res.json();
    fileSha = json.content.sha;
    setSyncState('synced');
  } catch(e) {
    setSyncState('error');
    showToast('Speichern fehlgeschlagen: ' + e.message);
  }
}

// ─── SYNC STATE ───────────────────────────────────────────────────────────────
function setSyncState(state) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-text');
  dot.className = 'sync-dot';
  if (state === 'synced') { dot.classList.add('synced'); txt.textContent = 'Synchronisiert'; }
  else if (state === 'syncing') { dot.classList.add('syncing'); txt.textContent = 'Synchronisiere...'; }
  else { txt.textContent = 'Sync-Fehler'; }
}

  currentUser = val;

  document.getElementById('current-user-label').textContent = '✓ Aktiv als: ' + val;
  document.getElementById('user-input').value = '';

}

function initUser() {

  }
}

// ─── TOGGLE ───────────────────────────────────────────────────────────────────
async function toggleItem(itemId) {
  if (!currentUser) {
    showToast('Bitte zuerst deinen Namen eingeben!');
    document.getElementById('user-input').focus();
    return;
  }
  const now = todoState[itemId];
  if (now && now.done) {
    todoState[itemId] = { done: false, user: '', time: '' };
  } else {
    const d = new Date();
    todoState[itemId] = {
      done: true,
      user: currentUser,
      time: d.toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit' }) + ' ' + d.toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' })
    };
  }
  render();
  await saveData();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  renderProgress();
  renderPhases();
}

function renderProgress() {
  let total = 0, done = 0;
  PHASES.forEach(p => p.items.forEach(it => {
    total++;
    if (todoState[it.id] && todoState[it.id].done) done++;
  }));
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-open').textContent = total - done;
  document.getElementById('stat-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

function renderPhases() {
  const container = document.getElementById('phases-container');
  container.innerHTML = '';
  PHASES.forEach(phase => {
    let phaseDone = 0;
    phase.items.forEach(it => { if (todoState[it.id] && todoState[it.id].done) phaseDone++; });
    const total = phase.items.length;
    const pct = Math.round(phaseDone / total * 100);
    const isOpen = openPhases[phase.id] !== false;

    const div = document.createElement('div');
    div.className = 'phase';

    // Header
    const header = document.createElement('div');
    header.className = 'phase-header';
    header.innerHTML = `
      <div class="phase-dot" style="background:${phase.color}"></div>
      <div class="phase-title">${phase.title}</div>
      <span class="phase-badge" style="background:${phase.color}22;color:${phase.color}">${phaseDone}/${total}</span>
      <span class="phase-pct">${pct}%</span>
      <span class="phase-chevron ${isOpen ? 'open' : ''}">▶</span>
    `;
    header.onclick = () => {
      openPhases[phase.id] = !isOpen;
      renderPhases();
    };

    // Phase bar
    const bar = document.createElement('div');
    bar.className = 'phase-bar';
    bar.style.background = 'var(--bg3)';
    bar.innerHTML = `<div class="phase-bar-fill" style="width:${pct}%;background:${phase.color};opacity:0.7"></div>`;

    // Items
    const itemsDiv = document.createElement('div');
    itemsDiv.className = 'items' + (isOpen ? ' open' : '');

    phase.items.forEach(item => {
      const st = todoState[item.id];
      const isDone = st && st.done;
      const row = document.createElement('div');
      row.className = 'item' + (isDone ? ' done' : '');
      row.innerHTML = `
        <div class="checkbox ${isDone ? 'checked' : ''}"></div>
        <div style="flex:1">
          <div class="item-text">${item.text}</div>
          <div class="item-sub">${item.sub}</div>
        </div>
        <div class="item-meta">
          ${isDone && st.user ? `<div class="item-who">✓ ${st.user}</div>` : ''}
          ${isDone && st.time ? `<div class="item-when">${st.time}</div>` : ''}
        </div>
      `;
      row.onclick = () => toggleItem(item.id);
      itemsDiv.appendChild(row);
    });

    div.appendChild(header);
    div.appendChild(bar);
    div.appendChild(itemsDiv);
    container.appendChild(div);
  });
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── AUTO-REFRESH (jede 30 Sek) ──────────────────────────────────────────────
setInterval(loadData, 30000);

// ─── INIT ─────────────────────────────────────────────────────────────────────
// Default: alle Phasen zu, erste auf
PHASES.forEach(p => { openPhases[p.id] = false; });
openPhases[PHASES[0].id] = true;

// initUser and loadData are called after password check above
</script>
</body>
